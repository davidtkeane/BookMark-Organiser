<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="helmet_grad" x1="600" y1="100" x2="600" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg_grad)"/>
  
  <!-- Grid HUD Overlay -->
  <path d="M0 50H1200 M0 350H1200 M50 0V400 M1150 0V400" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="600" cy="200" r="150" stroke="#6366F1" stroke-opacity="0.1" stroke-width="2"/>
  <circle cx="600" cy="200" r="180" stroke="#6366F1" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Scanning Lines -->
  <rect width="1200" height="2" fill="#6366F1" fill-opacity="0.1">
    <animate attributeName="y" from="50" to="350" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Stylized Ranger Helmet / Brain Core -->
  <g transform="translate(540, 120) scale(0.5)" filter="url(#glow)">
    <path d="M120 20C75.8 20 40 55.8 40 100V140C40 184.2 75.8 220 120 220C164.2 220 200 184.2 200 140V100C200 55.8 164.2 20 120 20Z" fill="url(#helmet_grad)"/>
    <path d="M50 110H190V130C190 130 170 145 120 145C70 145 50 130 50 130V110Z" fill="#0F172A"/>
    <path d="M110 145V220H130V145H110Z" fill="#0F172A"/>
    
    <!-- Neural Nodes -->
    <circle cx="120" cy="60" r="4" fill="white"/>
    <circle cx="80" cy="80" r="3" fill="white" fill-opacity="0.6"/>
    <circle cx="160" cy="80" r="3" fill="white" fill-opacity="0.6"/>
    <path d="M120 60 L80 80 M120 60 L160 80" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  </g>

  <!-- Title Text -->
  <text x="600" y="280" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-weight="900" font-size="64" letter-spacing="0.2em">MARKFLOW</text>
  <text x="600" y="310" text-anchor="middle" fill="#818CF8" font-family="JetBrains Mono, monospace" font-weight="500" font-size="14" letter-spacing="0.5em" fill-opacity="0.8">FRONTIER AI COMMAND CENTER</text>

  <!-- Status Tags -->
  <rect x="50" y="365" width="120" height="20" rx="4" fill="#6366F1" fill-opacity="0.1" stroke="#6366F1" stroke-opacity="0.2"/>
  <text x="110" y="379" text-anchor="middle" fill="#818CF8" font-family="monospace" font-size="10" font-weight="bold">ENGINE: GEMINI 3.1</text>

  <rect x="180" y="365" width="100" height="20" rx="4" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.2"/>
  <text x="230" y="379" text-anchor="middle" fill="#10B981" font-family="monospace" font-size="10" font-weight="bold">SYSTEM: ONLINE</text>

  <!-- Corner Deco -->
  <path d="M20 20 L50 20 M20 20 L20 50" stroke="#6366F1" stroke-width="3"/>
  <path d="M1180 20 L1150 20 M1180 20 L1180 50" stroke="#6366F1" stroke-width="3"/>
  <path d="M20 380 L50 380 M20 380 L20 350" stroke="#6366F1" stroke-width="3"/>
  <path d="M1180 380 L1150 380 M1180 380 L1180 350" stroke="#6366F1" stroke-width="3"/>
</svg>
